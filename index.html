  let activeTab  = "全て";
  let showMode   = "all";

  window.setTab  = t => { activeTab = t; render(); };
  window.setShow = m => {
    showMode = m;
    document.querySelectorAll(".stog").forEach(b => b.classList.remove("active"));
    document.getElementById("tog-" + m).classList.add("active");
    render();
  };

  function isFuture(d) { return new Date(d) > TODAY; }

  function render() {
    const q       = (document.getElementById("srch")?.value || "").toLowerCase();
    const released = CDS.filter(c => !isFuture(c.d));
    const total    = released.length;
    const ownedN   = released.filter(c => owned[c.id]).length;
    const pct      = total ? Math.round(ownedN / total * 100) : 0;

    document.getElementById("statTotal").textContent = total + " 枚";
    document.getElementById("statOwned").textContent = ownedN + " 枚";
    document.getElementById("statMiss").textContent  = (total - ownedN) + " 枚";
    document.getElementById("pgFill").style.width    = pct + "%";
    document.getElementById("pgPct").textContent     = pct + "%";

    // tabs
    document.getElementById("tabsRow").innerHTML = CATS.map(c =>
      `<button class="tab${activeTab === c ? " active" : ""}" onclick="setTab('${c}')">${c}</button>`
    ).join("");

    let items = CDS.filter(c => {
      if (activeTab !== "全て" && c.c !== activeTab) return false;
      if (q && !c.t.toLowerCase().includes(q) && !c.n.toLowerCase().includes(q) && !c.v.toLowerCase().includes(q)) return false;
      const fut = isFuture(c.d);
      if (showMode === "missing" && (owned[c.id] || fut)) return false;
      if (showMode === "owned"   && !owned[c.id])         return false;
      return true;
    });

    const groups = {};
    items.forEach(c => {
      const y = c.d.slice(0, 4) + "年";
      (groups[y] = groups[y] || []).push(c);
    });

    const listEl = document.getElementById("cdList");
    if (!items.length) {
      listEl.innerHTML = `<div class="empty">該当するCDが見つかりません</div>`;
      return;
    }

    let html = "";
    Object.keys(groups).sort().forEach(yr => {
      html += `<div class="sec-hdr">${yr}</div>`;
      groups[yr].forEach(c => {
        const isOwned = !!owned[c.id];
        const fut     = isFuture(c.d);
        const ds      = c.d.slice(5).replace("-", "/");
        const editable = `onclick="toggleOwned(${c.id})"`;
        html += `
          <div class="cd-item${isOwned ? " is-owned" : ""} editable" ${editable}>
            <span class="check-icon">${isOwned ? "✓" : ""}</span>
            <div class="cd-info">
              <div class="cd-title">${c.t}${c.v ? `<span class="cd-ver">【${c.v}】</span>` : ""}</div>
              <div class="cd-sub">
                <span class="badge bdg-${BADGE[c.c]}">${c.c}</span>
                ${c.n ? `<span class="cd-note">${c.n}</span>` : ""}
              </div>
            </div>
            <div class="cd-meta">
              <span class="cd-date">${ds}</span>
              ${fut ? `<span class="fut-badge">未発売</span>` : ""}
            </div>
          </div>`;
      });
    });
    listEl.innerHTML = html;
  }
  window.render = render;

  // 初回リアルタイム同期スタート
  startSync();
</script>

<style>
  /* ─── リセット & ベース ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:    #FF6B9D;
    --purple:  #9B59E8;
    --sky:     #5BC8F5;
    --yellow:  #FFD166;
    --bg:      #FFF0F6;
    --surface: #FFFFFF;
    --border:  #FADADF;
    --text:    #2D1144;
    --muted:   #8B7095;
    --owned:   #1DBF87;
  }

  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── ヘッダー ───────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #FF6B9D 0%, #C44BE4 50%, #5BC8F5 100%);
    padding: 2rem 1.5rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦";
    position: absolute;
    top: 8px; left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,.35);
    letter-spacing: 8px;
  }
  .header-inner { max-width: 760px; margin: 0 auto; }
  .site-title {
    font-family: "Dela Gothic One", sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,.2);
    letter-spacing: .02em;
  }
  .site-sub { font-size: 12px; color: rgba(255,255,255,.8); margin-top: 4px; }

  .auth-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 1rem; flex-wrap: wrap;
  }
  #authBtn {
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.5);
    color: #fff; border-radius: 20px;
    padding: 5px 16px; font-size: 12px; cursor: pointer;
    font-family: inherit;
    transition: background .2s;
  }
  #authBtn:hover { background: rgba(255,255,255,.35); }
  #ownerBadge {
    display: none; align-items: center; gap: 4px;
    background: var(--yellow); color: #4A3000;
    border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700;
  }

  /* ─── メインコンテンツ ──────────────────────────────────── */
  main { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ─── 統計カード ────────────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 10px; margin-bottom: 1rem;
  }
  .stat {
    background: var(--surface);
    border-radius: 14px;
    padding: .9rem 1rem;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(255,107,157,.08);
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-num   { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-num.o { color: var(--owned); }
  .stat-num.m { color: var(--pink); }

  /* ─── プログレスバー ────────────────────────────────────── */
  .pg-wrap { margin-bottom: 1.25rem; }
  .pg-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); margin-bottom: 6px;
  }
  .pg-bar {
    height: 8px; background: var(--border);
    border-radius: 20px; overflow: hidden;
  }
  .pg-fill {
    height: 100%; background: linear-gradient(90deg, var(--owned), var(--sky));
    border-radius: 20px; transition: width .5s ease;
  }

  /* ─── 検索・フィルター ──────────────────────────────────── */
  .controls {
    display: flex; gap: 8px;
    margin-bottom: .75rem; flex-wrap: wrap; align-items: center;
  }
  .search {
    flex: 1; min-width: 160px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    font-family: inherit; font-size: 13px; color: var(--text);
    transition: border-color .2s;
  }
  .search:focus { outline: none; border-color: var(--pink); }
  .search::placeholder { color: var(--muted); }

  .stog {
    padding: 6px 12px; font-size: 11px;
    border: 1.5px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--muted);
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: all .15s;
  }
  .stog.active { background: var(--surface); color: var(--text); border-color: var(--purple); }

  .tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tab {
    padding: 5px 12px; font-size: 11px;
    border: 1.5px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--muted);
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: all .15s;
  }
  .tab.active { background: var(--pink); border-color: var(--pink); color: #fff; font-weight: 700; }

  /* ─── CDリスト ──────────────────────────────────────────── */
  .sec-hdr {
    font-size: 11px; font-weight: 700; color: var(--muted);
    padding: 8px 4px 3px; letter-spacing: .08em;
    border-bottom: 1px solid var(--border);
    margin-top: 10px;
  }
  .cd-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px;
    border-radius: 10px;
    transition: background .12s;
  }
  .cd-item.editable { cursor: pointer; }
  .cd-item.editable:hover { background: rgba(255,107,157,.07); }
  .cd-item.is-owned .cd-title { color: var(--muted); }

  .check-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border); border-radius: 6px;
    font-size: 12px; font-weight: 700;
    color: var(--owned); background: var(--surface);
    transition: all .15s;
  }
  .is-owned .check-icon {
    background: var(--owned); border-color: var(--owned); color: #fff;
  }

  .cd-info { flex: 1; min-width: 0; }
  .cd-title {
    font-size: 13px; font-weight: 500; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color .15s;
  }
  .cd-ver  { font-weight: 400; font-size: 10px; color: var(--muted); margin-left: 3px; }
  .cd-sub  { display: flex; gap: 6px; align-items: center; margin-top: 2px; flex-wrap: wrap; }
  .cd-note { font-size: 10px; color: var(--muted); }

  .badge {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    font-weight: 700; white-space: nowrap;
  }
  .bdg-album  { background: #EAE6FF; color: #4A3BB5; }
  .bdg-single { background: #D4F5EB; color: #0A6648; }
  .bdg-insert { background: #FFE0EC; color: #8B1A3E; }
  .bdg-unit   { background: #FFF0C2; color: #6B4200; }
  .bdg-bd     { background: #D6EEFF; color: #0A4A80; }
  .bdg-club   { background: #DFFFCA; color: #2A5E0A; }
  .bdg-other  { background: #EEEAE6; color: #5A5249; }

  .cd-meta {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 3px; flex-shrink: 0;
  }
  .cd-date  { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .fut-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 8px;
    background: #FFE0D6; color: #8B2A0A; font-weight: 700;
  }

  .empty {
    text-align: center; padding: 3rem;
    color: var(--muted); font-size: 14px;
  }

  /* ─── 注記 ───────────────────────────────────────────────── */
  .owner-note {
    text-align: center; font-size: 11px; color: var(--muted);
    margin-top: 1rem; padding: .5rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 6px; }
    .stat-num  { font-size: 18px; }
    header     { padding: 1.5rem 1rem 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">Liella! CD Collection</div>
    <div class="site-sub">Love Live! Superstar!! Liella! ディスコグラフィー コレクション管理</div>
      <div class="auth-row">
      <button id="authBtn">読み込み中…</button>
     <span id="ownerBadge">★ オーナー編集モード</span>
</div>
  </div>
</header>

<main>
  <!-- 統計 -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">発売済タイトル</div>
      <div class="stat-num" id="statTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">所持済み</div>
      <div class="stat-num o" id="statOwned">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">未所持</div>
      <div class="stat-num m" id="statMiss">—</div>
    </div>
  </div>

  <!-- プログレスバー -->
  <div class="pg-wrap">
    <div class="pg-label">
      <span>コレクション進捗</span>
      <span id="pgPct">0%</span>
    </div>
    <div class="pg-bar">
      <div class="pg-fill" id="pgFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 検索・フィルター -->
  <div class="controls">
    <input class="search" type="text" id="srch" placeholder="タイトルで検索…" oninput="render?.()">
    <div style="display:flex;gap:5px">
      <button class="stog active" id="tog-all"     onclick="setShow('all')">全て</button>
      <button class="stog"        id="tog-missing"  onclick="setShow('missing')">未所持</button>
      <button class="stog"        id="tog-owned"    onclick="setShow('owned')">所持済み</button>
    </div>
  </div>

  <!-- カテゴリタブ -->
  <div class="tabs" id="tabsRow"></div>

  <!-- CDリスト -->
  <div id="cdList"><div class="empty">読み込み中…</div></div>

  <div class="owner-note">
    ※ チェック状態はこのブラウザに保存されます。他の端末・他の人とは共有されません。
  </div>
</main>

</body>
</html>
